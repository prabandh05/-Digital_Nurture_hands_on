<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register Event</title>

    <style>
        form {
            width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid black;
        }
    </style>

    <script>

        function validatePhone() {
            let phone = document.getElementById("phone").value;
            if(phone.length != 10) {
                alert("Phone number must be 10 digits");
            }
        }

        function showFee() {
            let event = document.getElementById("eventType").value;
            let fee = "";

            if(event=="Music") fee="₹200";
            else if(event=="Sports") fee="₹300";
            else fee="₹150";

            document.getElementById("fee").innerHTML = "Fee: " + fee;
        }

        function confirmRegister() {
            document.getElementById("result").value =
                "Registration Submitted Successfully";
        }

        function countChars() {
            let count = document.getElementById("feedback").value.length;
            document.getElementById("charCount").innerHTML =
                "Characters: " + count;
        }

        function enlarge(img) {
            img.style.width = "400px";
        }

    </script>
</head>
<body>

<form>

    Name:
    <input type="text" placeholder="Enter name" required autofocus><br><br>

    Email:
    <input type="email" placeholder="Enter email" required><br><br>

    Phone:
    <input type="text" id="phone" onblur="validatePhone()"><br><br>

    Date:
    <input type="date" required><br><br>

    Event Type:
    <select id="eventType" onchange="showFee()">
        <option>Music</option>
        <option>Sports</option>
        <option>Workshop</option>
    </select>

    <p id="fee"></p>

    Message:
    <textarea></textarea><br><br>

    Feedback:
    <textarea id="feedback" onkeyup="countChars()"></textarea>

    <p id="charCount"></p>

    <img src="images/event1.jpg" width="150"
         ondblclick="enlarge(this)">

    <br><br>

    <button onclick="confirmRegister()">Submit</button>

    <output id="result"></output>

</form>

</body>
</html>
